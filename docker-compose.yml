# docker-compose.yml

services:
  # Serviço do Backend (Django)
  backend:
    build: ./backend
    container_name: dojo_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis

  # Serviço do Frontend (React)
  frontend:
    build: ./frontend
    container_name: dojo_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true

  # Serviço do Banco de Dados (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: dojo_db
    environment:
      - POSTGRES_USER=dojouemura
      - POSTGRES_PASSWORD=senha_segura
      - POSTGRES_DB=dojouemura
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data

  # Serviço do pgAdmin (Gerenciador de BD)
  pgadmin:
    image: dpage/pgadmin4
    container_name: dojo_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dojouemura.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  # NOVO: Serviço do Redis (Gestor de Fila)
  redis:
    image: redis:7-alpine
    container_name: dojo_redis
    restart: always

  # NOVO: Serviço do Celery Worker (Trabalhador de Segundo Plano)
  celery_worker:
    build: ./backend # Usa a mesma imagem do backend
    container_name: dojo_celery_worker
    command: celery -A core worker -l info # Comando para iniciar o worker
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - backend
      - redis

volumes:
  dbdata:
  pgadmin_data:
  media_data: {}
